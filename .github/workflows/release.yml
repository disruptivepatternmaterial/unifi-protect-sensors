name: Create Release on Tag

# Automatically publishes a GitHub Release whenever a version tag is pushed.
# Uses the built-in GITHUB_TOKEN (no personal access token required), which is
# what HACS needs in order to detect and install a new version.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section for this tag
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$(mktemp)"
          # Pull the matching "## [x.y.z]" block out of docs/CHANGELOG.md, if present.
          if [ -f docs/CHANGELOG.md ]; then
            awk -v tag="$TAG" '
              $0 ~ "^## \\[" tag "\\]" {capture=1; next}
              capture && /^## \[/ {exit}
              capture {print}
            ' docs/CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release ${GITHUB_REF_NAME}" > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
